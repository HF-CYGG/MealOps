<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MealOps 用户端</title>
  <style>
    :root {
      --bg: #f7f8fa;
      --panel: #ffffff;
      --text: #172026;
      --muted: #667085;
      --line: #d9e0e8;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --accent: #16a34a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      background: #0f172a;
      color: white;
    }
    header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
      letter-spacing: 0;
    }
    header span { color: #cbd5e1; font-size: 14px; }
    main {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      max-width: 1440px;
      margin: 0 auto;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .stack { display: grid; gap: 12px; align-content: start; }
    h2 {
      margin: 0 0 12px;
      font-size: 17px;
      font-weight: 650;
    }
    h3 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 650;
    }
    label {
      display: grid;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      font: inherit;
      color: var(--text);
      background: white;
    }
    textarea {
      min-height: 86px;
      resize: vertical;
      font-family: Consolas, "SFMono-Regular", monospace;
    }
    button {
      border: 0;
      border-radius: 6px;
      padding: 9px 12px;
      font: inherit;
      color: white;
      background: var(--brand);
      cursor: pointer;
    }
    button:hover { background: var(--brand-dark); }
    button.secondary {
      color: var(--text);
      background: #e8edf4;
    }
    button.secondary:hover { background: #d8e0ea; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .status {
      min-height: 22px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.ok { color: var(--accent); }
    pre {
      margin: 0;
      min-height: 420px;
      max-height: 680px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #101828;
      color: #d1e7ff;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tabs button {
      color: var(--text);
      background: #edf2f7;
    }
    .tabs button.active {
      color: white;
      background: var(--brand);
    }
    .panel { display: none; }
    .panel.active { display: grid; gap: 12px; }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
      header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
<header>
  <h1>MealOps 用户端</h1>
  <span>示例手机号：13900000000</span>
</header>

<main>
  <div class="stack">
    <section>
      <h2>登录</h2>
      <div class="stack">
        <label>服务地址
          <input id="baseUrl" value="">
        </label>
        <label>手机号
          <input id="phone" value="13900000000" inputmode="tel">
        </label>
        <label>验证码
          <input id="code" value="123456" inputmode="numeric">
        </label>
        <div class="actions">
          <button id="loginBtn">登录</button>
          <button class="secondary" id="healthBtn">健康检查</button>
        </div>
        <div id="loginStatus" class="status">未登录</div>
      </div>
    </section>

    <section>
      <h2>浏览</h2>
      <div class="actions">
        <button class="secondary" data-call="GET /category/list?type=1">菜品分类</button>
        <button class="secondary" data-call="GET /category/list?type=2">套餐分类</button>
        <button class="secondary" data-call="GET /dish/list?categoryId=1001">热销菜品</button>
        <button class="secondary" data-call="GET /setmeal/list?categoryId=2001">单人套餐</button>
        <button class="secondary" data-call="GET /shoppingCart/list">购物车</button>
      </div>
    </section>
  </div>

  <section>
    <div class="tabs" role="tablist">
      <button class="active" data-tab="cartPanel">点餐</button>
      <button data-tab="addressPanel">地址</button>
      <button data-tab="orderPanel">下单</button>
      <button data-tab="rawPanel">自定义</button>
    </div>

    <div id="cartPanel" class="panel active">
      <h2>购物车</h2>
      <div class="grid">
        <label>菜品ID
          <input id="cartDishId" value="3001">
        </label>
        <label>套餐ID
          <input id="cartSetmealId" value="">
        </label>
        <label>口味
          <input id="cartFlavor" value="微辣">
        </label>
      </div>
      <div class="actions">
        <button id="addDishBtn">加入菜品</button>
        <button id="addSetmealBtn">加入套餐</button>
        <button class="secondary" id="cartListBtn">刷新购物车</button>
        <button class="secondary" id="cartCleanBtn">清空购物车</button>
      </div>
    </div>

    <div id="addressPanel" class="panel">
      <h2>地址簿</h2>
      <div class="grid">
        <label>收货人
          <input id="consignee" value="测试用户">
        </label>
        <label>手机号
          <input id="addressPhone" value="13900000000">
        </label>
        <label>省市区
          <input id="region" value="北京市 北京市 东城区">
        </label>
        <label>标签
          <input id="label" value="学校">
        </label>
      </div>
      <label>详细地址
        <textarea id="detail">演示路 1 号 MealOps 实训楼 808</textarea>
      </label>
      <div class="actions">
        <button id="saveAddressBtn">保存地址</button>
        <button class="secondary" id="addressListBtn">刷新地址</button>
        <button class="secondary" id="defaultAddressBtn">默认地址</button>
      </div>
    </div>

    <div id="orderPanel" class="panel">
      <h2>订单</h2>
      <div class="grid">
        <label>地址ID
          <input id="addressBookId" value="7001">
        </label>
        <label>支付方式
          <select id="payMethod">
            <option value="1">微信</option>
            <option value="2">支付宝</option>
          </select>
        </label>
        <label>餐具数量
          <input id="tablewareNumber" type="number" value="1">
        </label>
        <label>餐具状态
          <select id="tablewareStatus">
            <option value="1">按餐量提供</option>
            <option value="0">无需餐具</option>
          </select>
        </label>
      </div>
      <label>备注
        <textarea id="remark">少油少盐，尽快送达。</textarea>
      </label>
      <div class="actions">
        <button id="submitOrderBtn">提交订单</button>
        <button class="secondary" id="orderListBtn">订单列表</button>
      </div>
    </div>

    <div id="rawPanel" class="panel">
      <h2>自定义请求</h2>
      <div class="grid">
        <label>方法
          <select id="rawMethod">
            <option>GET</option>
            <option>POST</option>
            <option>PUT</option>
            <option>DELETE</option>
          </select>
        </label>
        <label>路径
          <input id="rawPath" value="/health">
        </label>
      </div>
      <label>JSON Body
        <textarea id="rawBody">{}</textarea>
      </label>
      <div class="actions">
        <button id="rawSendBtn">发送</button>
      </div>
    </div>

    <h3>响应</h3>
    <pre id="output">等待请求...</pre>
  </section>
</main>

<script>
  const $ = (id) => document.getElementById(id);
  const tokenKey = "mealops-user-token";
  const baseUrlInput = $("baseUrl");
  const output = $("output");
  const loginStatus = $("loginStatus");

  baseUrlInput.value = window.location.origin;
  let token = localStorage.getItem(tokenKey) || "";
  renderLoginStatus();

  function baseUrl() {
    return baseUrlInput.value.replace(/\/$/, "");
  }

  function renderLoginStatus() {
    loginStatus.textContent = token ? "已保存 token" : "未登录";
    loginStatus.className = token ? "status ok" : "status";
  }

  function show(value) {
    output.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
  }

  function parseJson(text, fallback) {
    if (!text.trim()) return fallback;
    try {
      return JSON.parse(text);
    } catch (error) {
      throw new Error("JSON 格式错误：" + error.message);
    }
  }

  async function request(method, path, body) {
    const headers = { "Accept": "application/json" };
    if (body !== undefined) headers["Content-Type"] = "application/json";
    if (token) {
      headers.Authorization = "Bearer " + token;
      headers.token = token;
    }
    const response = await fetch(baseUrl() + path, {
      method,
      headers,
      body: body === undefined ? undefined : JSON.stringify(body)
    });
    const text = await response.text();
    const data = text ? parseJson(text, text) : null;
    if (!response.ok) {
      throw new Error(response.status + " " + response.statusText + "\n" + JSON.stringify(data, null, 2));
    }
    return data;
  }

  async function run(label, method, path, body) {
    show("请求中：" + label);
    try {
      const data = await request(method, path, body);
      show(data);
      return data;
    } catch (error) {
      show(error.message);
      throw error;
    }
  }

  function regionParts() {
    const parts = $("region").value.split(/\s+/).filter(Boolean);
    return {
      provinceName: parts[0] || "",
      cityName: parts[1] || "",
      districtName: parts[2] || ""
    };
  }

  document.querySelectorAll(".tabs button").forEach((button) => {
    button.addEventListener("click", () => {
      document.querySelectorAll(".tabs button").forEach((item) => item.classList.remove("active"));
      document.querySelectorAll(".panel").forEach((item) => item.classList.remove("active"));
      button.classList.add("active");
      $(button.dataset.tab).classList.add("active");
    });
  });

  document.querySelectorAll("[data-call]").forEach((button) => {
    button.addEventListener("click", () => {
      const [method, path] = button.dataset.call.split(" ");
      run(button.textContent, method, path);
    });
  });

  $("loginBtn").addEventListener("click", async () => {
    const data = await run("用户登录", "POST", "/user/login", {
      phone: $("phone").value,
      code: $("code").value
    });
    token = data && data.data && (data.data.token || data.data);
    if (token && typeof token === "object") token = token.token || token.jwt || "";
    if (token) localStorage.setItem(tokenKey, token);
    renderLoginStatus();
  });

  $("healthBtn").addEventListener("click", () => run("健康检查", "GET", "/health"));

  $("addDishBtn").addEventListener("click", () => run("加入菜品", "POST", "/shoppingCart/add", {
    dishId: $("cartDishId").value,
    dishFlavor: $("cartFlavor").value
  }));

  $("addSetmealBtn").addEventListener("click", () => run("加入套餐", "POST", "/shoppingCart/add", {
    setmealId: $("cartSetmealId").value || "5001"
  }));

  $("cartListBtn").addEventListener("click", () => run("购物车列表", "GET", "/shoppingCart/list"));
  $("cartCleanBtn").addEventListener("click", () => run("清空购物车", "DELETE", "/shoppingCart/clean"));

  $("saveAddressBtn").addEventListener("click", () => {
    const region = regionParts();
    run("保存地址", "POST", "/addressBook", {
      consignee: $("consignee").value,
      phone: $("addressPhone").value,
      sex: "女",
      provinceName: region.provinceName,
      cityName: region.cityName,
      districtName: region.districtName,
      detail: $("detail").value,
      label: $("label").value,
      isDefault: 1
    });
  });

  $("addressListBtn").addEventListener("click", () => run("地址列表", "GET", "/addressBook/list"));
  $("defaultAddressBtn").addEventListener("click", () => run("默认地址", "GET", "/addressBook/default"));

  $("submitOrderBtn").addEventListener("click", () => run("提交订单", "POST", "/order/submit", {
    addressBookId: $("addressBookId").value,
    payMethod: Number($("payMethod").value),
    remark: $("remark").value,
    tablewareNumber: Number($("tablewareNumber").value),
    tablewareStatus: Number($("tablewareStatus").value)
  }));

  $("orderListBtn").addEventListener("click", () => run("订单列表", "GET", "/order/userPage?page=1&pageSize=10"));

  $("rawSendBtn").addEventListener("click", () => {
    const method = $("rawMethod").value;
    const path = $("rawPath").value.startsWith("/") ? $("rawPath").value : "/" + $("rawPath").value;
    const body = method === "GET" ? undefined : parseJson($("rawBody").value, {});
    run("自定义请求", method, path, body);
  });
</script>
</body>
</html>
