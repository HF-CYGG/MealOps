<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MealOps 用户点单端</title>
  <link rel="stylesheet" href="./assets/css/mealops.css">
</head>
<body>
<div class="app-shell user-shell" id="userApp">
  <header class="user-topbar">
    <div class="brand-row">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">M</span>
        <div>
          <h1>MealOps 点单</h1>
          <p id="userStatus">未登录，示例手机号 13900000000</p>
        </div>
      </div>
      <div class="action-row">
        <button class="secondary" id="refreshUserBtn" type="button">刷新</button>
        <button class="ghost" id="logoutUserBtn" type="button">退出</button>
      </div>
    </div>
    <div class="session-strip" aria-label="当前桌台会话">
      <div class="mini-stat"><span>桌号</span><strong id="sessionTable">未选择</strong></div>
      <div class="mini-stat"><span>人数</span><strong id="sessionGuests">-</strong></div>
      <div class="mini-stat"><span>状态</span><strong id="sessionState">待创建</strong></div>
    </div>
  </header>

  <main>
    <section class="login-card" id="loginPanel">
      <div class="section-heading">
        <div>
          <h2>手机号登录</h2>
          <p class="muted">登录后可创建或加入桌台并提交订单。</p>
        </div>
        <span class="status-pill">UTF-8</span>
      </div>
      <div class="form-grid">
        <label>手机号
          <input id="phoneInput" type="tel" inputmode="tel" autocomplete="tel" value="13900000000">
        </label>
        <label>昵称
          <input id="nameInput" autocomplete="name" value="演示顾客">
        </label>
        <button id="loginUserBtn" type="button">登录并进入点单</button>
      </div>
    </section>

    <section class="login-card">
      <div class="section-heading">
        <div>
          <h2>桌台会话</h2>
          <p class="muted">创建桌台后，同桌成员可通过会话号加入并共享点单。</p>
        </div>
        <button class="secondary" id="clearSessionBtn" type="button">清除桌台</button>
      </div>
      <div class="form-grid two">
        <label>桌号
          <select id="tableSelect">
            <option value="8101" data-session="8201">A01 四人桌（已有会话 8201）</option>
            <option value="8102" selected>A02 四人桌</option>
            <option value="8103">B01 六人桌</option>
          </select>
        </label>
        <label>人数
          <input id="guestInput" type="number" min="1" max="12" value="2">
        </label>
        <label>加入会话号
          <input id="joinSessionInput" inputmode="numeric" placeholder="例如 8201">
        </label>
      </div>
      <div class="action-row">
        <button id="createSessionBtn" type="button">创建桌台</button>
        <button class="secondary" id="joinSessionBtn" type="button">加入桌台</button>
        <button class="secondary" id="sameTableBtn" type="button">同桌已点</button>
      </div>
    </section>

    <div class="content-grid">
      <nav class="category-rail" id="categoryRail" aria-label="商品分类"></nav>
      <section class="menu-area" aria-label="商品列表">
        <div class="search-card">
          <label class="sr-only" for="searchInput">搜索商品</label>
          <input id="searchInput" type="search" placeholder="搜索菜品、套餐、口味">
          <div class="action-row" id="kindTabs">
            <button class="chip active" data-kind="dish" type="button">菜品</button>
            <button class="chip" data-kind="setmeal" type="button">套餐</button>
          </div>
        </div>
        <div class="product-list" id="productList"></div>
      </section>
    </div>
  </main>

  <aside class="cart-bar" aria-label="购物车">
    <div>
      <strong id="cartTotal">¥0.00</strong>
      <span id="cartSummary">购物车为空</span>
    </div>
    <div class="action-row">
      <button class="secondary" id="openCartBtn" type="button">同桌已点</button>
      <button id="submitOrderOpenBtn" type="button">提交订单</button>
    </div>
  </aside>
</div>

<div class="drawer-backdrop" id="drawerBackdrop"></div>

<aside class="drawer" id="productDrawer" aria-label="商品详情">
  <div class="drawer-header">
    <h2 id="productDrawerTitle">商品详情</h2>
    <button class="secondary" data-close-drawer="#productDrawer" type="button">关闭</button>
  </div>
  <div id="productDrawerBody"></div>
</aside>

<aside class="drawer" id="cartDrawer" aria-label="同桌已点">
  <div class="drawer-header">
    <div>
      <h2>同桌已点</h2>
      <p class="muted" id="cartDrawerHint">当前桌台购物车</p>
    </div>
    <button class="secondary" data-close-drawer="#cartDrawer" type="button">关闭</button>
  </div>
  <div class="drawer-list" id="cartList"></div>
  <div class="action-row">
    <button class="danger" id="cleanCartBtn" type="button">清空</button>
    <button id="submitOrderBtn" type="button">提交订单</button>
  </div>
</aside>

<aside class="drawer" id="orderDrawer" aria-label="提交订单">
  <div class="drawer-header">
    <div>
      <h2>确认订单</h2>
      <p class="muted">支付状态为预留演示，可在后台查看。</p>
    </div>
    <button class="secondary" data-close-drawer="#orderDrawer" type="button">关闭</button>
  </div>
  <div class="form-grid">
    <label>收餐人
      <input id="consigneeInput" value="演示顾客">
    </label>
    <label>联系电话
      <input id="addressPhoneInput" type="tel" value="13900000000">
    </label>
    <label>桌台备注地址
      <input id="addressDetailInput" value="堂食桌台">
    </label>
    <label>支付方式
      <select id="payMethodInput">
        <option value="1">微信支付</option>
        <option value="2">支付宝</option>
      </select>
    </label>
    <label>口味备注
      <textarea id="remarkInput">少油少盐，餐齐后一起上。</textarea>
    </label>
    <div class="action-row">
      <button id="confirmSubmitBtn" type="button">确认提交</button>
      <button class="secondary" id="simulatePaidBtn" type="button">模拟已支付</button>
    </div>
  </div>
</aside>

<details class="debug-panel" style="margin: 0 16px 16px;">
  <summary>调试响应</summary>
  <pre id="debugOutput">等待请求...</pre>
</details>

<script src="./assets/js/api.js" defer></script>
<script src="./assets/js/store.js" defer></script>
<script src="./assets/js/ui.js" defer></script>
<script src="./assets/js/user-app.js" defer></script>
</body>
</html>
