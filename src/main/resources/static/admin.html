<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MealOps 后台运营管理端</title>
  <link rel="stylesheet" href="./assets/css/mealops.css">
</head>
<body>
<div class="app-shell admin-shell" id="adminApp">
  <aside class="admin-sidebar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">M</span>
      <div>
        <h1>MealOps</h1>
        <p>运营管理端</p>
      </div>
    </div>
    <nav class="admin-nav" aria-label="后台模块">
      <button class="nav-item active" data-target="overviewPage" type="button">总览</button>
      <button class="nav-item" data-target="categoryPage" type="button">分类管理</button>
      <button class="nav-item" data-target="dishPage" type="button">菜品管理</button>
      <button class="nav-item" data-target="setmealPage" type="button">套餐管理</button>
      <button class="nav-item" data-target="tablePage" type="button">桌台会话</button>
      <button class="nav-item" data-target="orderPage" type="button">订单管理</button>
      <button class="nav-item" data-target="paymentPage" type="button">支付记录</button>
      <button class="nav-item" data-target="logPage" type="button">操作日志</button>
    </nav>
    <div class="login-card" style="margin: 0; background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.14);">
      <label style="color:#e8f1f6;">账号
        <input id="adminUsername" autocomplete="username" value="admin">
      </label>
      <label style="color:#e8f1f6;">密码
        <input id="adminPassword" type="password" autocomplete="current-password" value="123456">
      </label>
      <button id="adminLoginBtn" type="button">管理员登录</button>
      <button class="secondary" id="adminLogoutBtn" type="button">退出登录</button>
      <p class="muted" id="adminStatus">未登录</p>
    </div>
  </aside>

  <main class="admin-main">
    <header class="admin-topbar">
      <div>
        <h1 style="margin:0;font-size:22px;">运营工作台</h1>
        <p class="muted" id="adminSubtitle">管理分类、菜品、套餐、订单与支付状态。</p>
      </div>
      <div class="action-row">
        <button class="secondary" id="adminHealthBtn" type="button">健康检查</button>
        <button id="adminRefreshBtn" type="button">刷新当前模块</button>
      </div>
    </header>

    <section class="admin-page active" id="overviewPage">
      <div class="metrics-grid" id="metricsGrid"></div>
      <div class="data-panel">
        <div class="panel-heading">
          <h2>热销与待办</h2>
          <button class="secondary" id="loadOverviewBtn" type="button">刷新总览</button>
        </div>
        <div id="overviewContent"></div>
      </div>
    </section>

    <section class="admin-page" id="categoryPage">
      <div class="data-panel">
        <div class="table-toolbar">
          <h2>分类管理</h2>
          <div class="action-row">
            <select id="categoryTypeFilter" aria-label="分类类型">
              <option value="">全部分类</option>
              <option value="1">菜品分类</option>
              <option value="2">套餐分类</option>
            </select>
            <button id="newCategoryBtn" type="button">新增分类</button>
            <button class="secondary" data-refresh="categories" type="button">刷新</button>
          </div>
        </div>
        <div class="table-wrap"><table id="categoryTable"></table></div>
      </div>
    </section>

    <section class="admin-page" id="dishPage">
      <div class="data-panel">
        <div class="table-toolbar">
          <h2>菜品管理</h2>
          <div class="action-row">
            <input id="dishKeyword" type="search" placeholder="搜索菜名">
            <button id="newDishBtn" type="button">新增菜品</button>
            <button class="secondary" data-refresh="dishes" type="button">刷新</button>
          </div>
        </div>
        <div class="table-wrap"><table id="dishTable"></table></div>
      </div>
    </section>

    <section class="admin-page" id="setmealPage">
      <div class="data-panel">
        <div class="table-toolbar">
          <h2>套餐管理</h2>
          <div class="action-row">
            <input id="setmealKeyword" type="search" placeholder="搜索套餐">
            <button id="newSetmealBtn" type="button">新增套餐</button>
            <button class="secondary" data-refresh="setmeals" type="button">刷新</button>
          </div>
        </div>
        <div class="table-wrap"><table id="setmealTable"></table></div>
      </div>
    </section>

    <section class="admin-page" id="tablePage">
      <div class="data-panel">
        <div class="table-toolbar">
          <h2>桌台会话</h2>
          <button class="secondary" data-refresh="tables" type="button">刷新</button>
        </div>
        <div class="table-wrap"><table id="tableSessionTable"></table></div>
      </div>
    </section>

    <section class="admin-page" id="orderPage">
      <div class="data-panel">
        <div class="table-toolbar">
          <h2>订单管理</h2>
          <div class="action-row">
            <select id="orderStatusFilter" aria-label="订单状态">
              <option value="">全部状态</option>
              <option value="1">待付款</option>
              <option value="2">待确认</option>
              <option value="3">已确认</option>
              <option value="4">派送中</option>
              <option value="5">已完成</option>
              <option value="6">已取消</option>
            </select>
            <button class="secondary" data-refresh="orders" type="button">刷新</button>
          </div>
        </div>
        <div class="table-wrap"><table id="orderTable"></table></div>
      </div>
    </section>

    <section class="admin-page" id="paymentPage">
      <div class="data-panel">
        <div class="table-toolbar">
          <h2>支付记录</h2>
          <button class="secondary" data-refresh="payments" type="button">刷新</button>
        </div>
        <div class="table-wrap"><table id="paymentTable"></table></div>
      </div>
    </section>

    <section class="admin-page" id="logPage">
      <div class="data-panel">
        <div class="table-toolbar">
          <h2>操作日志</h2>
          <button class="secondary" data-refresh="logs" type="button">刷新</button>
        </div>
        <div class="table-wrap"><table id="logTable"></table></div>
      </div>
    </section>

    <details class="debug-panel">
      <summary>折叠调试响应</summary>
      <pre id="adminDebug">等待请求...</pre>
    </details>
  </main>
</div>

<div class="drawer-backdrop" id="adminDrawerBackdrop"></div>
<aside class="drawer admin" id="adminDrawer" aria-label="编辑">
  <div class="drawer-header">
    <h2 id="adminDrawerTitle">编辑</h2>
    <button class="secondary" data-close-drawer="#adminDrawer" type="button">关闭</button>
  </div>
  <form class="form-grid" id="adminEditForm"></form>
</aside>

<script src="./assets/js/api.js" defer></script>
<script src="./assets/js/store.js" defer></script>
<script src="./assets/js/ui.js" defer></script>
<script src="./assets/js/admin-app.js" defer></script>
</body>
</html>
