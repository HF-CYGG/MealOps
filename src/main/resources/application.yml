server:
  port: 8080

spring:
  application:
    name: mealops
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/reggie?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:}
      timeout: 3s
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 3s
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.cjc.mealops.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

mealops:
  upload-dir: ${MEALOPS_UPLOAD_DIR:uploads}
  database-initializer:
    enabled: ${MEALOPS_DB_INIT_ENABLED:true}
    seed-data-enabled: ${MEALOPS_DB_INIT_SEED_DATA_ENABLED:true}
  admin:
    enabled: ${MEALOPS_ADMIN_BOOTSTRAP_ENABLED:true}
    username: ${MEALOPS_ADMIN_USERNAME:admin}
    password: ${MEALOPS_ADMIN_PASSWORD:admin1330}
    name: ${MEALOPS_ADMIN_NAME:System Admin}
    phone: ${MEALOPS_ADMIN_PHONE:13800000000}
  jwt:
    secret: ${MEALOPS_JWT_SECRET:mealops-local-secret-change-me}
    ttl-hours: ${MEALOPS_JWT_TTL_HOURS:2}

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.cjc.mealops: ${MEALOPS_LOG_LEVEL:INFO}
    com.baomidou.mybatisplus: INFO
