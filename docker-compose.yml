services:
  mysql:
    image: mysql:8.4
    container_name: mealops-mysql
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mealops-dev-root}
      MYSQL_DATABASE: reggie
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ${MEALOPS_MYSQL_DATA_DIR:-./docker-data/mysql}:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./sql/data.sql:/docker-entrypoint-initdb.d/02-data.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mealops-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ];
      then redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
      else redis-server --appendonly yes;
      fi'
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ${MEALOPS_REDIS_DATA_DIR:-./docker-data/redis}:/data
    healthcheck:
      test: ["CMD-SHELL", "if [ -n \"$${REDIS_PASSWORD}\" ]; then redis-cli -a \"$${REDIS_PASSWORD}\" ping; else redis-cli ping; fi"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mealops-backend:local
    container_name: mealops-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      MYSQL_URL: jdbc:mysql://mysql:3306/reggie?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      MYSQL_USERNAME: ${MYSQL_USERNAME:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mealops-dev-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: ${REDIS_DATABASE:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      MEALOPS_UPLOAD_DIR: /app/uploads
      MEALOPS_JWT_SECRET: ${MEALOPS_JWT_SECRET:-mealops-docker-secret-change-me}
      MEALOPS_JWT_TTL_HOURS: ${MEALOPS_JWT_TTL_HOURS:-2}
      LOG_PATH: /app/logs
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ${MEALOPS_UPLOADS_DIR:-./docker-data/uploads}:/app/uploads
      - ${MEALOPS_LOGS_DIR:-./docker-data/logs}:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: mealops-frontend:local
    container_name: mealops-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8088}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
