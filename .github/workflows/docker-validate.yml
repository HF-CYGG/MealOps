name: Validate Docker Images

on:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "release-v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  full-stack-validation:
    name: Full Stack Integration Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run Maven tests
        run: mvn -B test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run Docker Compose integration smoke test
        run: TIMEOUT_SECONDS=240 sh tools/docker-smoke-test.sh
